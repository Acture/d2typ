name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: docpack
  FORMULA_NAME: docpack
  LEGACY_FORMULA_NAME: d2typ
  TAP_REPOSITORY: Acture/homebrew-tools

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate release tag
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]* ) ;;
            * )
              echo "tag ${GITHUB_REF_NAME} does not look like semver (expected vX.Y.Z)"
              exit 1
              ;;
          esac
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test

  create-release:
    needs: [verify, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ env.BIN_NAME }}
          target: ${{ matrix.target }}
          checksum: sha256
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Resolve crates.io publish mode
        id: publish-mode
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "mode=token" >> "${GITHUB_OUTPUT}"
          else
            echo "mode=trusted" >> "${GITHUB_OUTPUT}"
          fi
      - name: Publish using crates.io token
        if: ${{ steps.publish-mode.outputs.mode == 'token' }}
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Authenticate with crates.io trusted publishing
        if: ${{ steps.publish-mode.outputs.mode == 'trusted' }}
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish using crates.io trusted publishing
        if: ${{ steps.publish-mode.outputs.mode == 'trusted' }}
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

  update-homebrew-tap:
    needs: [publish-crate, upload-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tap token is configured
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update ${TAP_REPOSITORY}"
            exit 1
          fi
      - name: Check out tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap-repo
      - name: Compute release metadata
        id: release-meta
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          version="${RELEASE_TAG#v}"
          archive_url="https://github.com/${REPOSITORY}/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          curl -fsSL "${archive_url}" -o release.tar.gz
          sha256="$(sha256sum release.tar.gz | awk '{print $1}')"
          {
            echo "version=${version}"
            echo "archive_url=${archive_url}"
            echo "sha256=${sha256}"
          } >> "${GITHUB_OUTPUT}"
      - name: Render formula
        run: |
          python3 scripts/render_homebrew_formula.py \
            --name "${FORMULA_NAME}" \
            --description "Freeze structured data into document-native modules" \
            --homepage "https://github.com/${GITHUB_REPOSITORY}" \
            --url "${{ steps.release-meta.outputs.archive_url }}" \
            --sha256 "${{ steps.release-meta.outputs.sha256 }}" \
            --bin "${BIN_NAME}" \
            --output "tap-repo/Formula/${FORMULA_NAME}.rb"
          rm -f "tap-repo/Formula/${LEGACY_FORMULA_NAME}.rb"
      - name: Commit and push tap update
        working-directory: tap-repo
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula
          if git diff --cached --quiet; then
            echo "No tap changes to commit"
            exit 0
          fi
          git commit -m "docpack ${RELEASE_TAG#v}"
          git push
